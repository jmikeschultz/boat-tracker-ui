<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boat Tracker</title>

  <!-- Styles -->
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Your app logic -->
  <script type="module" src="/static/js/script.js" defer></script>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%2210 0 100 100%22><text y=%22.90em%22 font-size=%2290%22>⚓</text></svg>">
</head>
<body>
  <header>
    <div class="header-title-container">
      <button id="btn-prev-week" class="nav-btn" title="Previous week of motion">◀</button>
      <h1>Boat Tracker</h1>
      <button id="btn-next-week" class="nav-btn" title="Next week of motion">▶</button>
    </div>
  </header>

  <!-- Controls -->
  <div id="controls">
    <label for="year-select">Year:</label>
    <select id="year-select">
      <option value="2026" selected>2026</option>
      <option value="2025">2025</option>
    </select>
    
    <div id="timeline-wrapper">
      <div id="timeline-container">
        <canvas id="timeline-chart"></canvas>
        <div id="brush-window">
          <div class="brush-handle left-handle"></div>
          <div class="brush-handle right-handle"></div>
        </div>
      </div>
      <div id="timeline-months">
        <div>Jan</div><div>Feb</div><div>Mar</div><div>Apr</div><div>May</div><div>Jun</div>
        <div>Jul</div><div>Aug</div><div>Sep</div><div>Oct</div><div>Nov</div><div>Dec</div>
      </div>
    </div>
    
    <div id="date-range-display">--</div>
  </div>

  <!-- Map + Graph Resizable Layout -->
  <div id="main-container">
    <div id="map-container">
      <div id="map"></div>
    </div>
    <div id="resizer"></div>
    <div id="graph-container">
      <canvas id="speed-graph"></canvas>
      <div id="engine-hours-container">
        Engine Hours: <span id="engine-hours">--</span> hrs
      </div>
    </div>
  </div>

  <!-- Engine Hours Init -->
  <script type="module">
    import { updateEngineHours } from "/static/js/api.js";
    document.addEventListener("DOMContentLoaded", updateEngineHours);
  </script>

  <!-- Resizer Logic -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const resizer = document.getElementById("resizer");
      const mapContainer = document.getElementById("map-container");
      const graphContainer = document.getElementById("graph-container");

      let isDragging = false;

      resizer.addEventListener("mousedown", () => {
        isDragging = true;
        document.body.style.cursor = "row-resize";
      });

      document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;

        const containerTop = document.getElementById("main-container").offsetTop;
        const totalHeight = document.getElementById("main-container").clientHeight;
        const mapHeight = e.clientY - containerTop;
        const graphHeight = totalHeight - mapHeight - resizer.offsetHeight;

        if (mapHeight < 100 || graphHeight < 100) return;

        mapContainer.style.flex = "none";
        mapContainer.style.height = `${mapHeight}px`;
        graphContainer.style.height = `${graphHeight}px`;

        if (window.map?.invalidateSize) {
          window.map.invalidateSize();
        }
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
        document.body.style.cursor = "default";
      });
    });
  </script>
</body>
</html>
